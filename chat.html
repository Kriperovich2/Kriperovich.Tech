<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Анонимный мессенджер | GistDB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        /* (стили без изменений, как в предыдущей версии) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0712;
            color: #f0eaff;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        body.dark {
            --bg-page: #0a0712;
            --bg-screen: #13101c;
            --bg-header: #2a1e42;
            --border: #3d2c5e;
            --bg-item: transparent;
            --bg-input: #2a1e42;
            --text-primary: #f0eaff;
            --text-secondary: #9b8bcb;
            --accent: #6a1b9a;
            --accent-hover: #8a2bbe;
            --danger: #8b3c3c;
        }
        body.light {
            --bg-page: #f0f2f5;
            --bg-screen: #ffffff;
            --bg-header: #e4e6eb;
            --border: #d0d4da;
            --bg-item: #f8f9fa;
            --bg-input: #f0f2f5;
            --text-primary: #1c1e21;
            --text-secondary: #65676b;
            --accent: #1b74e4;
            --accent-hover: #0e5dbb;
            --danger: #e41e3f;
        }
        body {
            background: var(--bg-page);
            color: var(--text-primary);
        }
        .screen {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-screen);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }
        .hidden { display: none !important; }
        .header {
            background: var(--bg-header);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .header h2 {
            font-size: 1.2rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-icon {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .btn-icon:hover { background: var(--border); }
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-item);
        }
        .item-info {
            flex: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--border);
        }
        .item-details {
            flex: 1;
        }
        .item-title { font-weight: 500; margin-bottom: 4px; }
        .item-sub { font-size: 0.75rem; color: var(--text-secondary); }
        .item-actions {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-btn:hover { background: var(--accent-hover); }
        .danger-btn { background: var(--danger); }
        .search-bar {
            padding: 8px 16px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
        }
        .search-bar input {
            width: 100%;
            padding: 10px;
            background: var(--bg-input);
            border: none;
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .message-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 0.9rem;
            word-wrap: break-word;
        }
        .message-own .message-bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-other .message-bubble {
            background: var(--bg-header);
            border-bottom-left-radius: 4px;
        }
        .message-meta {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        .message-own .message-meta { color: #ddccff; }
        .message-img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }
        audio { max-width: 200px; border-radius: 20px; }
        .delete-btn {
            background: none;
            border: none;
            color: #ff9e8f;
            cursor: pointer;
            font-size: 0.7rem;
            margin-left: 8px;
        }
        .input-area {
            background: var(--bg-header);
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: var(--bg-input);
            border: none;
            padding: 10px 12px;
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }
        .input-area button {
            background: var(--accent);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover { background: var(--accent-hover); }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: var(--bg-screen);
            width: 90%;
            max-width: 360px;
            border-radius: 24px;
            padding: 20px;
            color: var(--text-primary);
        }
        .modal-card h3 { margin-bottom: 16px; }
        .modal-card input, .modal-card textarea, .modal-card select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            background: var(--bg-input);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
        }
        .modal-card button {
            background: var(--accent);
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 24px;
            color: white;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
        }
        .modal-card button:hover { background: var(--accent-hover); }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 12px;
            display: block;
            background: var(--bg-input);
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-header);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            z-index: 1100;
            pointer-events: none;
        }
        .loader { text-align: center; padding: 20px; color: var(--text-secondary); }
        .admin-badge {
            background: var(--accent);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
        .token-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .token-card {
            background: var(--bg-screen);
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
        }
        .token-card textarea, .token-card input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            background: var(--bg-input);
            border: none;
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: monospace;
        }
        .token-card button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }
        .token-card .copy-btn {
            background: var(--border);
            margin-top: 4px;
        }
        .token-card small {
            display: block;
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            text-align: center;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tabs {
            display: flex;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            background: var(--bg-header);
            color: var(--text-secondary);
            transition: 0.2s;
        }
        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            font-weight: bold;
        }
        button, .action-btn, .btn-icon {
            touch-action: manipulation;
        }
        input, textarea, select {
            font-size: 16px !important;
        }
    </style>
</head>
<body class="dark">

<!-- Экран логина -->
<div id="loginScreen" class="screen">
    <div class="header"><h2>🔐 Анонимный мессенджер</h2></div>
    <div class="search-bar"><input type="text" id="searchAccounts" placeholder="🔍 Поиск аккаунтов..."></div>
    <div class="list-container" id="accountsList"><div class="loader">Загрузка аккаунтов...</div></div>
    <div style="padding: 16px; border-top: 1px solid var(--border);">
        <input type="text" id="newAccName" placeholder="Логин (username)" autocomplete="off">
        <input type="password" id="newAccPass" placeholder="Пароль">
        <button id="createAccBtn" style="margin-top: 8px;">➕ Создать аккаунт</button>
    </div>
</div>

<!-- Главный экран после входа (вкладки) -->
<div id="mainScreen" class="screen hidden">
    <div class="header">
        <h2 id="mainUserName"></h2>
        <div>
            <button id="accountSettingsBtn" class="btn-icon" title="Настройки аккаунта">⚙️</button>
            <button id="logoutBtn" class="btn-icon" title="Сменить аккаунт">🚪</button>
        </div>
    </div>
    <div class="tabs">
        <div class="tab" data-tab="groups">📁 Группы</div>
        <div class="tab" data-tab="directs">💬 Личные чаты</div>
    </div>
    <div class="search-bar"><input type="text" id="searchChats" placeholder="🔍 Поиск..."></div>
    <div class="list-container" id="chatsList"><div class="loader">Загрузка...</div></div>
    <div class="input-area" style="justify-content: space-evenly; gap: 8px;" id="actionButtonArea">
        <button id="createGroupBtn" style="width: auto; padding: 0 16px; border-radius: 24px;">➕ Новая группа</button>
        <button id="newDirectBtn" style="width: auto; padding: 0 16px; border-radius: 24px;">💬 Новый диалог</button>
    </div>
</div>

<!-- Экран чата -->
<div id="chatScreen" class="screen hidden">
    <div class="header">
        <button id="backToMainBtn" class="btn-icon">←</button>
        <h2 id="chatTitle">Чат</h2>
        <button id="chatSettingsBtn" class="btn-icon" title="Настройки">⚙️</button>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="input-area">
        <button id="attachImageBtn" title="Изображение">🖼️</button>
        <button id="voiceRecordBtn" title="Голосовое">🎙️</button>
        <input type="text" id="messageInput" placeholder="Сообщение" autocomplete="off">
        <button id="sendTextBtn">➤</button>
    </div>
</div>

<script>
    // ----- ФИКСИРОВАННЫЕ ДАННЫЕ (Gist ID) -----
    const MAIN_GIST_ID = "746f99bb5a18eb2531e7c954e22b78ba";
    const ADMIN_NAME = "1";

    let GITHUB_TOKEN = null;
    let currentUser = null;
    let currentChat = null;
    let allGroups = [];
    let allDirectChats = [];
    let messages = [];
    let pollInterval = null;
    let activeChatPassword = null;
    let accountsCache = [];

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if(isError) toast.style.background = 'var(--danger)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function apiRequest(url, method = 'GET', body = null) {
        if (!GITHUB_TOKEN) throw new Error('Токен GitHub не задан');
        const headers = { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' };
        if (body) headers['Content-Type'] = 'application/json';
        const res = await fetch(url + (url.includes('?') ? '&' : '?') + `ts=${Date.now()}`, { method, headers, body: body ? JSON.stringify(body) : undefined });
        if (!res.ok) throw new Error(`Gist API error ${res.status}`);
        return await res.json();
    }

    // Функция для безопасного парсинга JSON с очисткой
    function safeJSONParse(str, fallback = null) {
        if (!str) return fallback;
        // Удаляем непечатаемые символы, кроме разрешённых
        let cleaned = str.replace(/[\u0000-\u001F\u007F-\u009F]/g, '');
        try {
            return JSON.parse(cleaned);
        } catch (e) {
            console.error('JSON parse error:', e);
            // Пробуем ещё раз, обрезав до последнего валидного места (приблизительно)
            try {
                // Найти последнюю закрывающую фигурную скобку
                let lastValid = cleaned.lastIndexOf('}');
                if (lastValid > 0) {
                    let truncated = cleaned.substring(0, lastValid+1);
                    return JSON.parse(truncated);
                }
            } catch (e2) {}
            return fallback;
        }
    }

    async function getMainGist() {
        try {
            const data = await apiRequest(`https://api.github.com/gists/${MAIN_GIST_ID}`);
            let content = data.files['main.json']?.content;
            if (!content) {
                console.warn('main.json отсутствует, создаём пустой');
                return { accounts: [], groups: [], directChats: [] };
            }
            let parsed = safeJSONParse(content, null);
            if (parsed) return parsed;
            
            // Если основной файл повреждён, пробуем восстановить из backup
            const backupContent = data.files['main.backup.json']?.content;
            if (backupContent) {
                let backupParsed = safeJSONParse(backupContent, null);
                if (backupParsed) {
                    showToast('Восстановлены данные из резервной копии', false);
                    return backupParsed;
                }
            }
            // Если ничего не помогло – спрашиваем пользователя
            const reset = confirm('Данные повреждены и не могут быть восстановлены автоматически. Сбросить все данные? (ВНИМАНИЕ: все аккаунты и группы будут удалены!)');
            if (reset) {
                const empty = { accounts: [], groups: [], directChats: [] };
                await updateMainGist(empty, true); // принудительно перезаписываем
                return empty;
            } else {
                throw new Error('Данные повреждены, работа невозможна. Обратитесь к администратору.');
            }
        } catch (e) {
            console.error('Ошибка получения main gist:', e);
            showToast('Критическая ошибка: ' + e.message, true);
            throw e;
        }
    }

    async function updateMainGist(contentObj, forceReset = false) {
        // Создаём резервную копию перед записью
        try {
            const current = await apiRequest(`https://api.github.com/gists/${MAIN_GIST_ID}`);
            const currentContent = current.files['main.json']?.content;
            if (currentContent && !forceReset) {
                // Сохраняем резервную копию
                const backupPayload = { files: { 'main.backup.json': { content: currentContent } } };
                await apiRequest(`https://api.github.com/gists/${MAIN_GIST_ID}`, 'PATCH', backupPayload);
            }
        } catch(e) { console.warn('Не удалось создать резервную копию', e); }

        const payload = { files: { 'main.json': { content: JSON.stringify(contentObj, null, 2) } } };
        await apiRequest(`https://api.github.com/gists/${MAIN_GIST_ID}`, 'PATCH', payload);
    }

    async function getMessagesRaw(gistId) {
        try {
            const data = await apiRequest(`https://api.github.com/gists/${gistId}`);
            const content = data.files['messages.json']?.content || '[]';
            return safeJSONParse(content, []);
        } catch (e) {
            console.error(`Ошибка парсинга сообщений ${gistId}:`, e);
            return [];
        }
    }

    async function updateMessages(gistId, encryptedArray) {
        const payload = { files: { 'messages.json': { content: JSON.stringify(encryptedArray, null, 2) } } };
        await apiRequest(`https://api.github.com/gists/${gistId}`, 'PATCH', payload);
    }

    async function createNewGist(initialMessages = []) {
        const payload = { description: "Chat messages", public: false, files: { 'messages.json': { content: JSON.stringify(initialMessages) } } };
        const gist = await apiRequest('https://api.github.com/gists', 'POST', payload);
        return gist.id;
    }

    async function deleteGist(gistId) {
        await fetch(`https://api.github.com/gists/${gistId}`, { method: 'DELETE', headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
    }

    function encryptMessageObj(msgObj, password) {
        return CryptoJS.AES.encrypt(JSON.stringify(msgObj), password).toString();
    }

    function decryptMessageObj(encryptedStr, password) {
        try {
            const bytes = CryptoJS.AES.decrypt(encryptedStr, password);
            const decrypted = bytes.toString(CryptoJS.enc.Utf8);
            if (!decrypted) throw new Error();
            return JSON.parse(decrypted);
        } catch (e) { throw new Error('Неверный пароль'); }
    }

    function hashPassword(pass) { return CryptoJS.SHA256(pass).toString(); }
    function generateDirectPassword(userA, userB) {
        const names = [userA, userB].sort();
        return CryptoJS.SHA256(names.join(':')).toString();
    }
    function defaultAvatar(name, type = 'account') {
        const canvas = document.createElement('canvas');
        canvas.width = 100;
        canvas.height = 100;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = type === 'account' ? '#6a1b9a' : '#3d2c5e';
        ctx.fillRect(0, 0, 100, 100);
        ctx.fillStyle = '#fff';
        ctx.font = '48px sans-serif';
        ctx.fillText(name.charAt(0).toUpperCase(), 30, 70);
        return canvas.toDataURL();
    }

    // ----- АККАУНТЫ -----
    async function loadAccounts() { const main = await getMainGist(); return main.accounts || []; }
    async function createAccount(username, password, displayName = null) {
        const main = await getMainGist();
        const accounts = main.accounts || [];
        if (accounts.find(a => a.username === username)) throw new Error('Логин уже существует');
        const newAccount = {
            username,
            passwordHash: hashPassword(password),
            displayName: displayName || username,
            avatar: defaultAvatar(username, 'account')
        };
        accounts.push(newAccount);
        main.accounts = accounts;
        await updateMainGist(main);
        return true;
    }
    async function loginAccount(username, password) {
        const main = await getMainGist();
        const acc = main.accounts.find(a => a.username === username);
        if (!acc) throw new Error('Аккаунт не найден');
        if (acc.passwordHash !== hashPassword(password)) throw new Error('Неверный пароль');
        currentUser = { ...acc };
        allGroups = main.groups || [];
        allDirectChats = main.directChats || [];
        accountsCache = main.accounts || [];
        return { groups: allGroups, directs: allDirectChats };
    }
    async function updateAccount(username, updates) {
        const main = await getMainGist();
        const index = main.accounts.findIndex(a => a.username === username);
        if (index === -1) throw new Error('Аккаунт не найден');
        main.accounts[index] = { ...main.accounts[index], ...updates };
        await updateMainGist(main);
        if (currentUser && currentUser.username === username) currentUser = { ...currentUser, ...updates };
        accountsCache = main.accounts;
    }
    async function deleteAccount(username, password) {
        const main = await getMainGist();
        const acc = main.accounts.find(a => a.username === username);
        if (!acc) throw new Error('Аккаунт не найден');
        const isAdmin = currentUser && currentUser.username === ADMIN_NAME;
        if (!isAdmin && acc.passwordHash !== hashPassword(password)) throw new Error('Неверный пароль');
        for (const g of main.groups) g.participants = g.participants.filter(p => p !== username);
        main.directChats = (main.directChats || []).filter(d => !d.participants.includes(username));
        main.accounts = main.accounts.filter(a => a.username !== username);
        await updateMainGist(main);
    }

    // ----- ГРУППЫ -----
    async function createGroup(name, password, avatar = null, description = '') {
        const gistId = await createNewGist([]);
        const main = await getMainGist();
        const groups = main.groups || [];
        const newGroup = {
            id: Date.now().toString(),
            name,
            gistId,
            participants: [currentUser.username],
            creator: currentUser.username,
            avatar: avatar || defaultAvatar(name, 'group'),
            description
        };
        groups.push(newGroup);
        main.groups = groups;
        await updateMainGist(main);
        return newGroup;
    }
    async function deleteGroup(groupId, gistId) {
        const main = await getMainGist();
        const group = main.groups.find(g => g.id === groupId);
        if (!group) throw new Error('Группа не найдена');
        if (group.creator !== currentUser.username && currentUser.username !== ADMIN_NAME) throw new Error('Нет прав');
        await deleteGist(gistId);
        main.groups = main.groups.filter(g => g.id !== groupId);
        await updateMainGist(main);
    }
    async function updateGroupMetadata(groupId, updates) {
        const main = await getMainGist();
        const idx = main.groups.findIndex(g => g.id === groupId);
        if (idx === -1) throw new Error('Группа не найдена');
        if (main.groups[idx].creator !== currentUser.username && currentUser.username !== ADMIN_NAME) throw new Error('Нет прав');
        main.groups[idx] = { ...main.groups[idx], ...updates };
        await updateMainGist(main);
        if (currentChat && currentChat.type === 'group' && currentChat.id === groupId) currentChat = { ...currentChat, ...updates };
    }
    async function joinGroup(group, password) {
        const rawMsgs = await getMessagesRaw(group.gistId);
        if (rawMsgs.length) decryptMessageObj(rawMsgs[0], password);
        const main = await getMainGist();
        const target = main.groups.find(g => g.id === group.id);
        if (!target) throw new Error('Группа не найдена');
        if (!target.participants.includes(currentUser.username)) target.participants.push(currentUser.username);
        await updateMainGist(main);
    }

    // ----- ЛИЧНЫЕ ЧАТЫ -----
    async function getOrCreateDirectChat(otherUsername) {
        const main = await getMainGist();
        let chat = (main.directChats || []).find(d => d.participants.includes(currentUser.username) && d.participants.includes(otherUsername));
        if (!chat) {
            const gistId = await createNewGist([]);
            chat = {
                id: Date.now().toString(),
                participants: [currentUser.username, otherUsername].sort(),
                gistId,
                lastMessage: null
            };
            main.directChats = [...(main.directChats || []), chat];
            await updateMainGist(main);
        }
        return chat;
    }
    async function loadDirectMessages(chat) {
        const password = generateDirectPassword(chat.participants[0], chat.participants[1]);
        const encrypted = await getMessagesRaw(chat.gistId);
        const decrypted = [];
        for (const enc of encrypted) {
            try { decrypted.push(decryptMessageObj(enc, password)); }
            catch { decrypted.push({ id: 'err', error: true, content: '[Не удалось расшифровать]' }); }
        }
        return decrypted.sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
    }
    async function sendDirectMessage(chat, msgObj) {
        const password = generateDirectPassword(chat.participants[0], chat.participants[1]);
        const encrypted = await getMessagesRaw(chat.gistId);
        encrypted.push(encryptMessageObj(msgObj, password));
        await updateMessages(chat.gistId, encrypted);
        const main = await getMainGist();
        const idx = main.directChats.findIndex(d => d.id === chat.id);
        if (idx !== -1) main.directChats[idx].lastMessage = msgObj.content?.slice(0, 50) || (msgObj.type === 'image' ? '📷 Изображение' : '🎙️ Голосовое');
        await updateMainGist(main);
    }

    // ----- ОБЩИЕ ФУНКЦИИ СООБЩЕНИЙ -----
    async function loadMessages(chat) {
        if (chat.type === 'group') {
            const group = allGroups.find(g => g.id === chat.id);
            if (!group) throw new Error('Группа не найдена');
            activeChatPassword = prompt(`Введите пароль группы "${group.name}":`);
            if (!activeChatPassword) throw new Error('Пароль не введён');
            const encrypted = await getMessagesRaw(group.gistId);
            const decrypted = [];
            for (const enc of encrypted) {
                try { decrypted.push(decryptMessageObj(enc, activeChatPassword)); }
                catch { decrypted.push({ id: 'err', error: true, content: '[Не удалось расшифровать]' }); }
            }
            return decrypted.sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
        } else {
            const direct = allDirectChats.find(d => d.id === chat.id);
            if (!direct) throw new Error('Чат не найден');
            const password = generateDirectPassword(direct.participants[0], direct.participants[1]);
            activeChatPassword = password;
            return await loadDirectMessages(direct);
        }
    }
    async function sendMessage(chat, msgObj) {
        if (chat.type === 'group') {
            const group = allGroups.find(g => g.id === chat.id);
            if (!group) throw new Error('Группа не найдена');
            const encrypted = await getMessagesRaw(group.gistId);
            encrypted.push(encryptMessageObj(msgObj, activeChatPassword));
            await updateMessages(group.gistId, encrypted);
        } else {
            const direct = allDirectChats.find(d => d.id === chat.id);
            if (!direct) throw new Error('Чат не найден');
            await sendDirectMessage(direct, msgObj);
        }
    }
    async function deleteMessage(chat, messageId, authorName) {
        if (authorName !== currentUser.username) throw new Error('Можно удалять только свои сообщения');
        if (chat.type === 'group') {
            const group = allGroups.find(g => g.id === chat.id);
            const encrypted = await getMessagesRaw(group.gistId);
            const newEncrypted = [];
            for (const enc of encrypted) {
                try {
                    const msg = decryptMessageObj(enc, activeChatPassword);
                    if (msg.id !== messageId) newEncrypted.push(enc);
                } catch { newEncrypted.push(enc); }
            }
            await updateMessages(group.gistId, newEncrypted);
        } else {
            const direct = allDirectChats.find(d => d.id === chat.id);
            const password = generateDirectPassword(direct.participants[0], direct.participants[1]);
            const encrypted = await getMessagesRaw(direct.gistId);
            const newEncrypted = [];
            for (const enc of encrypted) {
                try {
                    const msg = decryptMessageObj(enc, password);
                    if (msg.id !== messageId) newEncrypted.push(enc);
                } catch { newEncrypted.push(enc); }
            }
            await updateMessages(direct.gistId, newEncrypted);
        }
    }

    async function openChat(chat, password) {
        if (pollInterval) clearInterval(pollInterval);
        currentChat = chat;
        try {
            messages = await loadMessages(chat);
            renderChatMessages();
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            let title = '';
            if (chat.type === 'group') title = chat.data.name;
            else {
                const other = chat.data.participants.find(p => p !== currentUser.username);
                title = getUserDisplayName(other);
            }
            document.getElementById('chatTitle').innerHTML = `<img class="avatar" style="width: 32px; height: 32px; vertical-align: middle; margin-right: 8px;" src="${chat.type === 'group' ? chat.data.avatar : getUserAvatar(other)}"> ${escapeHtml(title)}`;
            pollInterval = setInterval(async () => {
                if (currentChat) {
                    try {
                        const newMsgs = await loadMessages(currentChat);
                        if (JSON.stringify(newMsgs) !== JSON.stringify(messages)) {
                            messages = newMsgs;
                            renderChatMessages();
                        }
                    } catch(e) { console.warn(e); }
                }
            }, 4000);
        } catch(e) { showToast(`Ошибка загрузки чата: ${e.message}`, true); renderMainScreen(); }
    }

    function renderChatMessages() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        messages.forEach(msg => {
            if (msg.error) {
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper message-other';
                wrapper.innerHTML = `<div class="message-avatar" style="background:var(--border);"></div><div class="message-bubble">${escapeHtml(msg.content)}</div>`;
                container.appendChild(wrapper);
                return;
            }
            const isOwn = msg.author === currentUser.username;
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isOwn ? 'message-own' : 'message-other'}`;
            const avatarUrl = getUserAvatar(msg.author);
            let contentHtml = '';
            if (msg.type === 'text') contentHtml = `<div>${escapeHtml(msg.content)}</div>`;
            else if (msg.type === 'image') contentHtml = `<img src="data:image/jpeg;base64,${msg.content}" class="message-img" onclick="window.open(this.src)">`;
            else if (msg.type === 'voice') contentHtml = `<audio controls src="data:audio/webm;base64,${msg.content}"></audio>`;
            const deleteBtn = isOwn ? `<button class="delete-btn" data-id="${msg.id}">🗑️</button>` : '';
            wrapper.innerHTML = `
                <img class="message-avatar" src="${avatarUrl}" alt="avatar">
                <div class="message-bubble">
                    ${contentHtml}
                    <div class="message-meta">${new Date(msg.timestamp).toLocaleTimeString()} ${getUserDisplayName(msg.author)} ${deleteBtn}</div>
                </div>
            `;
            container.appendChild(wrapper);
        });
        container.scrollTop = container.scrollHeight;
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const msgId = btn.getAttribute('data-id');
                if (confirm('Удалить сообщение?')) {
                    try {
                        await deleteMessage(currentChat, msgId, currentUser.username);
                        messages = await loadMessages(currentChat);
                        renderChatMessages();
                    } catch(e) { showToast(e.message, true); }
                }
            };
        });
    }

    function handleImageUpload() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => { await sendMediaMessage('image', ev.target.result.split(',')[1]); };
            reader.readAsDataURL(file);
        };
        input.click();
    }
    let mediaRecorder, audioChunks, isRecording = false, mediaStream;
    async function startVoiceRecording() {
        if (isRecording) return;
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(mediaStream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = async (ev) => { await sendMediaMessage('voice', ev.target.result.split(',')[1]); if (mediaStream) mediaStream.getTracks().forEach(t => t.stop()); };
                reader.readAsDataURL(blob);
                isRecording = false;
                document.getElementById('voiceRecordBtn').style.background = 'var(--accent)';
            };
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('voiceRecordBtn').style.background = 'var(--accent-hover)';
            showToast('Запись... отпустите кнопку');
        } catch(e) { showToast('Ошибка доступа к микрофону', true); }
    }
    function stopVoiceRecording() { if (mediaRecorder && isRecording) mediaRecorder.stop(); }

                if (newDisplay) currentUser.displayName = newDisplay;
                document.body.className = theme;
                localStorage.setItem('theme', theme);
                showToast('Настройки сохранены');
                modal.remove();
                await renderMainScreen();
            } catch(e) { showToast(e.message, true); }
        };
        modal.querySelector('#closeModal').onclick = () => modal.remove();
    }

    function showTokenModal() {
        const modal = document.createElement('div');
        modal.className = 'token-modal';
        modal.innerHTML = `
            <div class="token-card">
                <h3>🔐 Введите GitHub токен c <a href="https://docs.google.com/document/d/1YTx0oDH0DOz-qzmeMht7Kq-Pt_s_fNsdU7UhOPPUIRc/edit?usp=sharing" target="_blank">ССЫЛКИ</a></h3>
                <textarea id="tokenInput" rows="2" placeholder="ghp_..."></textarea>
                <button id="copyTokenBtn" class="copy-btn">📋 Скопировать токен</button>
                <button id="saveTokenBtn">✅ Далее</button>
                <small>Токен сохранится в браузере. Нужен scope gist.</small>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('copyTokenBtn').onclick = () => { document.getElementById('tokenInput').select(); document.execCommand('copy'); showToast('Токен скопирован'); };
        document.getElementById('saveTokenBtn').onclick = async () => {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) return showToast('Введите токен', true);
            try {
                const test = await fetch('https://api.github.com/user', { headers: { 'Authorization': `token ${token}` } });
                if (!test.ok) throw new Error('Токен недействителен');
                await fetch(`https://api.github.com/gists/${MAIN_GIST_ID}`, { headers: { 'Authorization': `token ${token}` } });
                GITHUB_TOKEN = token;
                localStorage.setItem('github_token', token);
                modal.remove();
                renderLoginScreen();
            } catch(err) { showToast('Ошибка: ' + err.message, true); }
        };
    }

    (async function init() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme;
        const savedToken = localStorage.getItem('github_token');
        if (savedToken) {
            GITHUB_TOKEN = savedToken;
            try {
                await fetch(`https://api.github.com/gists/${MAIN_GIST_ID}`, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
                renderLoginScreen();
            } catch { localStorage.removeItem('github_token'); showTokenModal(); }
        } else showTokenModal();
    })();

    document.getElementById('createAccBtn').onclick = async () => {
        const name = document.getElementById('newAccName').value.trim();
        const pass = document.getElementById('newAccPass').value;
        if (!name || !pass) return showToast('Введите логин и пароль');
        try { await createAccount(name, pass); showToast('Аккаунт создан, войдите'); renderLoginScreen(); }
        catch(e) { showToast(e.message, true); }
    };
    document.getElementById('logoutBtn').onclick = () => { if(pollInterval) clearInterval(pollInterval); currentUser = null; renderLoginScreen(); };
    document.getElementById('backToMainBtn').onclick = async () => { if(pollInterval) clearInterval(pollInterval); await renderMainScreen(); };
    document.getElementById('sendTextBtn').onclick = () => { const inp = document.getElementById('messageInput'); sendTextMessage(inp.value); inp.value = ''; };
    document.getElementById('messageInput').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('sendTextBtn').click(); });
    document.getElementById('attachImageBtn').onclick = handleImageUpload;
    document.getElementById('voiceRecordBtn').onmousedown = startVoiceRecording;
    document.getElementById('voiceRecordBtn').onmouseup = stopVoiceRecording;
    document.getElementById('voiceRecordBtn').ontouchstart = e => { e.preventDefault(); startVoiceRecording(); };
    document.getElementById('voiceRecordBtn').ontouchend = e => { e.preventDefault(); stopVoiceRecording(); };
    document.getElementById('chatSettingsBtn').onclick = () => { if(currentChat && currentChat.type === 'group') showGroupSettings(currentChat.data); else showToast('Настройки только для групп'); };
    document.getElementById('accountSettingsBtn').onclick = showAccountSettings;
</script>
</body>
</html>
